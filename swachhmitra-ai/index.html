<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwachhMitra AI - Smart Waste Management</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- SplashScreen Intro -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <i class="fa-solid fa-leaf grow-anim"></i>
                <h1 class="fade-in-text">SwachhMitra AI</h1>
            </div>
            <div class="splash-loader">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <p class="loading-text">Initializing Smart Waste System...</p>
            </div>
        </div>
    </div>

    <!-- Auth/Role Selection View -->
    <div id="auth-view" class="view-container active">
        <div class="auth-card reveal-anim">
            <img src="assets/bin-3d.png" alt="Smart Waste 3D" class="hero-3d-image">
            <div class="logo">
                <i class="fa-solid fa-leaf"></i>
                <h1>SwachhMitra AI</h1>
            </div>

            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" onclick="app.setAuthMode('login')">Login</button>
                <button id="tab-signup" class="auth-tab" onclick="app.setAuthMode('signup')">Sign Up</button>
            </div>

            <form id="auth-form" class="auth-form" onsubmit="app.handleAuth(event)">
                <!-- Signup-only: Name field -->
                <div class="form-group" id="signup-name-group" style="display:none;">
                    <label>Full Name</label>
                    <input type="text" id="auth-name" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email / Username</label>
                    <input type="text" id="auth-username" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" placeholder="••••••••" required>
                </div>
                <!-- Login-only: Role selector -->
                <div class="form-group" id="login-role-group">
                    <label>Login As</label>
                    <select id="auth-role" class="form-control" style="width:100%;padding:10px 14px;border:1.5px solid var(--border-color,#ddd);border-radius:10px;font-size:0.95rem;background:var(--card-bg,#fff);color:var(--text-color,#333);">
                        <option value="user">👤 User</option>
                        <option value="admin">🛡️ Admin</option>
                    </select>
                </div>
                <button type="submit" id="auth-submit-btn" class="btn primary-btn w-100">Login to Dashboard</button>
            </form>

            <p id="auth-switch-text" class="text-secondary mt-2" style="font-size: 0.85rem">
                Access for Admin or Registered Users
            </p>
        </div>
    </div>

    <!-- Main Dashboard View -->
    <div id="dashboard-view" class="view-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-leaf"></i>
                    <h2>SwachhMitra AI</h2>
                </div>
                <button class="close-sidebar" onclick="app.toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <ul class="nav-links" id="nav-links">
                <!-- Dynamic Nav Links based on role -->
            </ul>

            <div class="sidebar-footer">
                <button onclick="app.logout()" class="logout-btn" data-i18n="logout"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>
                    Logout</button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <button class="menu-toggle" onclick="app.toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                <div class="header-title">
                    <h2 id="page-title">Dashboard</h2>
                </div>
                <div class="header-actions">
                    <div class="lang-selector">
                        <select onchange="app.setLanguage(this.value)" id="lang-select">
                            <option value="en">English</option>
                            <option value="hi">हिंदी</option>
                            <option value="mr">मराठी</option>
                        </select>
                    </div>
                    <div class="notification-bell" onclick="app.toggleNotifications(); app.resetBadge();">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge" id="notification-badge" style="display: none;">0</span>
                    </div>
                    <div class="profile-pic">
                        <i class="fa-solid fa-circle-user"></i>
                    </div>
                </div>
            </header>

            <!-- Notifications Dropdown -->
            <div class="notifications-dropdown" id="notifications-dropdown">
                <h3>Notifications</h3>
                <div class="notification-list" id="notification-list">
                    <!-- Notifications will be injected here -->
                </div>
            </div>

            <!-- Content Container -->
            <div class="content-wrapper" id="content-wrapper">
                <!-- Pages will be injected here dynamically -->
            </div>
        </main>
    </div>

    <!-- Templates for Pages -->

    <!-- USER: Home Screen -->
    <template id="tpl-user-home">
        <div class="dashboard-grid">
            <div class="stats-card glass-morph reveal-anim delay-1" onmousemove="app.tiltCard(event, this)">
                <div class="icon-box green"><i class="fa-solid fa-leaf"></i></div>
                <div class="stat-info">
                    <h3 data-i18n="points">Eco Points</h3>
                    <p class="stat-value counter">350</p>
                </div>
            </div>
            <div class="stats-card glass-morph reveal-anim delay-2" onmousemove="app.tiltCard(event, this)">
                <div class="icon-box yellow"><i class="fa-regular fa-calendar-check"></i></div>
                <div class="stat-info">
                    <h3 data-i18n="pickup">Next Pickup</h3>
                    <p class="stat-value" data-i18n="tomorrow" style="font-size: 1.2rem; line-height: 1.5;">Tomorrow</p>
                </div>
            </div>
        </div>

        <div class="home-hero-section reveal-anim delay-3">
            <div class="hero-3d-card glass-morph">
                <div class="hero-content">
                    <div class="hero-text">
                        <h2 id="hero-title" data-i18n="my_bin_status">My Smart Bin Status</h2>
                        <div id="user-bin-visual-meta">
                            <!-- Live data injected here -->
                        </div>
                    </div>
                    <div class="bin-3d-visualizer">
                        <div class="liquid-container">
                            <div class="liquid" id="visual-liquid"></div>
                            <img src="assets/bin-3d.png" alt="3D Bin" class="bin-frame">
                        </div>
                    </div>
                </div>

                <div class="hero-footer-stats" id="hero-sensor-readouts">
                    <!-- Sensor data here -->
                </div>
            </div>
        </div>

        <div class="quick-actions-bar reveal-anim delay-4">
            <button class="action-btn primary"><i class="fa-solid fa-truck-fast"></i> <span
                    data-i18n="request_pickup">Request Pickup</span></button>
            <button class="action-btn secondary"><i class="fa-solid fa-receipt"></i> <span
                    data-i18n="history">History</span></button>
        </div>

        <div class="card mt-2 reveal-anim delay-3">
            <h3 data-i18n="quick_actions">Quick Actions</h3>
            <div style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;">
                <button class="btn primary-btn" onclick="alert('Pickup Requested!')"><i
                        class="fa-solid fa-truck-pickup"></i> Request Early Pickup</button>
                <button class="btn secondary-btn"><i class="fa-solid fa-clock-rotate-left"></i> View Bill &
                    History</button>
            </div>
        </div>
    </template>

    <!-- USER: Map View -->
    <template id="tpl-user-map">
        <div class="map-container">
            <div id="user-map" class="map-view"></div>
        </div>
    </template>

    <!-- USER: Smart Segregation Helper -->
    <template id="tpl-user-segregation">
        <div class="segregation-container">
            <div class="ai-search-box reveal-anim">
                <h2 data-i18n="sorting"><i class="fa-solid fa-robot"></i> AI Waste Classifier</h2>
                <p data-i18n="sorting_tip">Not sure where to throw it? Ask the AI!</p>
                <div class="search-input-wrapper">
                    <input type="text" id="waste-search" placeholder="e.g., Pizza Box, Milk Bottle, Apple..."
                        onkeyup="app.searchWaste(this.value)">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>

            <div id="segregation-result" class="segregation-result reveal-anim delay-1" style="display: none;">
                <!-- Result will be injected here -->
            </div>

            <div class="bin-reference-grid reveal-anim delay-2">
                <div class="bin-ref organic">
                    <img src="https://cdn-icons-png.flaticon.com/512/3247/3247321.png" alt="Organic">
                    <h4>Organic</h4>
                    <span>Green Bin</span>
                </div>
                <div class="bin-ref recyclable">
                    <img src="https://cdn-icons-png.flaticon.com/512/3244/3244015.png" alt="Recyclable">
                    <h4>Recyclable</h4>
                    <span>Blue Bin</span>
                </div>
                <div class="bin-ref plastic">
                    <img src="https://cdn-icons-png.flaticon.com/512/3244/3244026.png" alt="Plastic">
                    <h4>Hazardous</h4>
                    <span>Red Bin</span>
                </div>
            </div>
        </div>
    </template>

    <!-- ADMIN: 1. Bin Management -->
    <template id="tpl-admin-bins">
        <div class="card manage-bins-card">
            <div class="card-header-flex">
                <h3><i class="fa-solid fa-trash-can" style="color:var(--primary)"></i> Bin Management</h3>
                <button class="btn primary-btn" onclick="app.addBinModal()"><i class="fa-solid fa-plus"></i> Add Bin</button>
            </div>
            <div class="table-responsive mt-2">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Bin ID</th>
                            <th>Location</th>
                            <th>Area Type</th>
                            <th>Status</th>
                            <th>Last Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bins-table-body"></tbody>
                </table>
            </div>
        </div>
    </template>

    <!-- ADMIN: 2. Area Configuration -->
    <template id="tpl-admin-areas">
        <div class="card">
            <h3><i class="fa-solid fa-map-location-dot" style="color:var(--primary)"></i> Area Configuration</h3>
            <p class="text-muted">Define area types and assign fill-rate multipliers used in predictions.</p>
            <div class="table-responsive mt-2">
                <table class="data-table">
                    <thead><tr><th>Area Type</th><th>Fill Rate Multiplier (%/day)</th><th>Bins Assigned</th><th>Action</th></tr></thead>
                    <tbody id="area-config-body"></tbody>
                </table>
            </div>
            <div class="card mt-2" style="background:var(--primary-ultra-light);border:1px solid var(--primary-light);">
                <h4 style="margin-top:0;"><i class="fa-solid fa-plus"></i> Add / Edit Area Type</h4>
                <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
                    <div class="form-group" style="flex:1;min-width:140px;">
                        <label>Area Name</label>
                        <input type="text" id="area-name-input" placeholder="e.g. Industrial" style="width:100%;padding:8px 12px;border:1.5px solid var(--border-color,#ddd);border-radius:8px;">
                    </div>
                    <div class="form-group" style="flex:1;min-width:140px;">
                        <label>Multiplier (%)</label>
                        <input type="number" id="area-mult-input" placeholder="e.g. 20" min="1" max="100" style="width:100%;padding:8px 12px;border:1.5px solid var(--border-color,#ddd);border-radius:8px;">
                    </div>
                    <button class="btn primary-btn" onclick="app.saveAreaConfig()" style="height:40px;"><i class="fa-solid fa-floppy-disk"></i> Save</button>
                </div>
            </div>
        </div>
    </template>

    <!-- ADMIN: 3. Threshold Settings -->
    <template id="tpl-admin-thresholds">
        <div class="card">
            <h3><i class="fa-solid fa-sliders" style="color:var(--primary)"></i> Threshold Settings</h3>
            <p class="text-muted">Customize priority levels that control bin urgency and route generation.</p>
            <div style="display:flex;flex-direction:column;gap:20px;margin-top:20px;">
                <div class="card" style="border-left:4px solid #E53935;">
                    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                        <div>
                            <h4 style="margin:0;color:#E53935;"><i class="fa-solid fa-circle-exclamation"></i> High Priority</h4>
                            <p class="text-muted" style="margin:4px 0 0;">Bins above this level are marked critical</p>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <input type="range" id="thresh-high" min="50" max="95" value="70" oninput="document.getElementById('thresh-high-val').innerText=this.value+'%'" style="width:160px;">
                            <strong id="thresh-high-val" style="color:#E53935;min-width:40px;">70%</strong>
                        </div>
                    </div>
                </div>
                <div class="card" style="border-left:4px solid #FFB300;">
                    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                        <div>
                            <h4 style="margin:0;color:#FFB300;"><i class="fa-solid fa-circle-half-stroke"></i> Medium Priority</h4>
                            <p class="text-muted" style="margin:4px 0 0;">Bins between Medium and High threshold</p>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <input type="range" id="thresh-med" min="20" max="69" value="40" oninput="document.getElementById('thresh-med-val').innerText=this.value+'%'" style="width:160px;">
                            <strong id="thresh-med-val" style="color:#FFB300;min-width:40px;">40%</strong>
                        </div>
                    </div>
                </div>
                <div class="card" style="border-left:4px solid #4CAF50;">
                    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                        <div>
                            <h4 style="margin:0;color:#4CAF50;"><i class="fa-solid fa-circle"></i> Low Priority</h4>
                            <p class="text-muted" style="margin:4px 0 0;">Bins below Medium threshold — no action needed</p>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <strong style="color:#4CAF50;">Below Medium threshold</strong>
                        </div>
                    </div>
                </div>
            </div>
            <button class="btn primary-btn mt-2" onclick="app.saveThresholds()"><i class="fa-solid fa-floppy-disk"></i> Apply Thresholds</button>
        </div>
    </template>

    <!-- ADMIN: 4. System Monitoring -->
    <template id="tpl-admin-overview">
        <div class="dashboard-grid admin-stats">
            <div class="stats-card reveal-anim delay-1">
                <div class="icon-box green"><i class="fa-solid fa-dumpster"></i></div>
                <div class="stat-info"><h3>Total Bins</h3><p class="stat-value" id="mon-total">--</p></div>
            </div>
            <div class="stats-card reveal-anim delay-2">
                <div class="icon-box red"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div class="stat-info"><h3>Full Bins</h3><p class="stat-value" id="mon-full">--</p></div>
            </div>
            <div class="stats-card reveal-anim delay-3">
                <div class="icon-box yellow"><i class="fa-solid fa-circle-half-stroke"></i></div>
                <div class="stat-info"><h3>Medium Bins</h3><p class="stat-value" id="mon-medium">--</p></div>
            </div>
            <div class="stats-card reveal-anim delay-3">
                <div class="icon-box green"><i class="fa-solid fa-wifi"></i></div>
                <div class="stat-info"><h3>System Health</h3><p class="stat-value" id="mon-health">--</p></div>
            </div>
        </div>
        <div class="charts-grid">
            <div class="chart-card reveal-anim delay-2">
                <h3>Live Bin Fill Levels</h3>
                <div style="position:relative;height:300px;width:100%;"><canvas id="fill-level-chart"></canvas></div>
            </div>
            <div class="card reveal-anim delay-3">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h3 style="margin:0;">System Alerts</h3>
                    <span id="active-alert-count" style="font-size:0.8rem;color:var(--text-muted);"></span>
                </div>
                <div class="alert-list" id="admin-alerts"></div>
            </div>
        </div>
    </template>

    <!-- ADMIN: 5. Analytics -->
    <template id="tpl-admin-predictions">
        <!-- Efficiency Summary Cards -->
        <div class="dashboard-grid">
            <div class="stats-card reveal-anim delay-1">
                <div class="icon-box green"><i class="fa-solid fa-brain"></i></div>
                <div class="stat-info"><h3>Prediction Accuracy</h3><p class="stat-value" id="eff-accuracy">--</p></div>
            </div>
            <div class="stats-card reveal-anim delay-2">
                <div class="icon-box red"><i class="fa-solid fa-clock-rotate-left"></i></div>
                <div class="stat-info"><h3>Max Overflow Risk</h3><p class="stat-value" id="pred-risk-bin">--</p></div>
            </div>
            <div class="stats-card reveal-anim delay-3">
                <div class="icon-box green"><i class="fa-solid fa-truck-fast"></i></div>
                <div class="stat-info"><h3>Collections Today</h3><p class="stat-value" id="eff-collections">--</p></div>
            </div>
            <div class="stats-card reveal-anim delay-3">
                <div class="icon-box yellow"><i class="fa-solid fa-leaf"></i></div>
                <div class="stat-info"><h3>CO₂ Saved</h3><p class="stat-value" id="eff-co2">--</p></div>
            </div>
            <div class="stats-card reveal-anim delay-3">
                <div class="icon-box green"><i class="fa-solid fa-gas-pump"></i></div>
                <div class="stat-info"><h3>Fuel Saved</h3><p class="stat-value" id="eff-fuel">--</p></div>
            </div>
        </div>

        <!-- Time Range Filter + Export -->
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
            <div style="display:flex;gap:8px;">
                <button class="btn secondary-btn pred-range-btn active" onclick="app.initAdminPredictions(5)" data-range="5">±5 Hrs</button>
                <button class="btn secondary-btn pred-range-btn" onclick="app.initAdminPredictions(12)" data-range="12">±12 Hrs</button>
                <button class="btn secondary-btn pred-range-btn" onclick="app.initAdminPredictions(24)" data-range="24">±24 Hrs</button>
            </div>
            <button class="btn primary-btn" onclick="app.exportAnalyticsCSV()"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
        </div>

        <div class="charts-grid" style="margin-bottom:20px;">
            <div class="chart-card">
                <h3>Trend Analysis: Past vs Predicted</h3>
                <div style="position:relative;height:300px;width:100%;"><canvas id="prediction-line-chart"></canvas></div>
            </div>
            <div class="card">
                <h3>Smart Insights</h3>
                <ul class="route-stops mt-2" id="smart-insights-list"></ul>
            </div>
        </div>

        <!-- Sector-wise Analytics -->
        <div class="chart-card reveal-anim" style="margin-bottom:20px;">
            <h3>Sector-wise Analytics</h3>
            <div style="position:relative;height:260px;width:100%;"><canvas id="sector-analytics-chart"></canvas></div>
        </div>

        <h3 class="section-title">Proactive Bin Predictions</h3>
        <div class="bins-container" id="prediction-cards-container"></div>
    </template>

    <!-- ADMIN: AI Route Optimization (kept for routes nav) -->
    <template id="tpl-admin-routes">
        <div class="route-optimization-view">
            <div class="route-details">
                <div class="card">
                    <h3>AI Optimized Route (Zone A)</h3>
                    <p class="text-muted">Calculated based on fill levels and traffic patterns.</p>
                    <div style="display:flex;gap:10px;margin-bottom:15px;">
                        <button class="btn secondary-btn" onclick="app.simulateDay()" style="flex:1;"><i class="fa-solid fa-sun"></i> Simulate Day</button>
                        <button class="btn primary-btn" onclick="app.generateRoute()" style="flex:1;"><i class="fa-solid fa-route"></i> Generate Route</button>
                    </div>
                    <div class="route-stats" style="display:flex;flex-wrap:wrap;gap:10px;">
                        <div class="r-stat" style="flex:1 1 45%;"><span>Est. Time</span><strong id="stat-time">-- mins</strong></div>
                        <div class="r-stat" style="flex:1 1 45%;"><span>Urgent Bins</span><strong id="stat-urgent">--</strong></div>
                        <div class="r-stat" style="flex:1 1 45%;"><span>Distance Before</span><strong id="stat-dist-before">-- km</strong></div>
                        <div class="r-stat" style="flex:1 1 45%;"><span>Distance After</span><strong id="stat-dist-after">-- km</strong></div>
                        <div class="r-stat" style="flex:1 1 45%;"><span>Efficiency</span><strong id="stat-efficiency" style="color:var(--primary);">-- %</strong></div>
                        <div class="r-stat" style="flex:1 1 45%;"><span>Fuel Saved</span><strong id="stat-fuel" style="color:var(--primary);">-- L</strong></div>
                    </div>
                    <div class="card mt-2" style="background:var(--primary-ultra-light);border:1px solid var(--primary-light);">
                        <h4 style="margin-top:0;display:flex;align-items:center;gap:8px;color:var(--primary-dark);"><i class="fa-solid fa-lightbulb"></i> AI Insights</h4>
                        <div id="ai-insights-panel" style="font-size:0.85rem;color:var(--text-muted);"><i>Run simulation to get insights.</i></div>
                    </div>
                    <ul class="route-stops mt-2" id="route-stops"></ul>
                    <button class="btn primary-btn w-100 mt-2" onclick="app.assignRoute()"><i class="fa-solid fa-truck-fast"></i> Assign Route</button>
                </div>
            </div>
            <div class="route-map-container card" style="position:relative;">
                <div id="route-loading" class="calculating-overlay" style="display:none;">
                    <i class="fa-solid fa-brain" style="font-size:3rem;color:var(--primary);animation:float 3s infinite;"></i>
                    <h3 style="color:var(--primary-dark)">AI Calculating Optimal Route...</h3>
                    <p class="text-muted">Analyzing fill levels & traffic patterns</p>
                </div>
                <div id="admin-route-map" class="map-view"></div>
            </div>
        </div>
    </template>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chatbot UI -->
    <div id="chatbot-wrapper">
        <div id="chatbot-window" class="chatbot-window">
            <div class="chatbot-header">
                <div class="flex items-center gap-2">
                    <div class="chatbot-status-dot"></div>
                    <span class="font-bold">NovaBot Assistant</span>
                </div>
                <button onclick="app.toggleChat()" class="chatbot-close-btn">&times;</button>
            </div>
            <div id="chatbot-messages" class="chatbot-messages">
                <div class="message bot-message">Hello! I'm NovaBot. How can I help you with your smart waste system
                    today?</div>
            </div>
            <div class="chatbot-input-area">
                <input type="file" id="chatbot-camera-input" accept="image/*" capture="environment"
                    style="display: none;" onchange="app.handleChatImage(this)">
                <input type="file" id="chatbot-gallery-input" accept="image/*" style="display: none;"
                    onchange="app.handleChatImage(this)">

                <div style="display: flex; gap: 8px;">
                    <button onclick="document.getElementById('chatbot-camera-input').click()" class="chat-tool-btn"
                        title="Capture Image">
                        <i class="fa-solid fa-camera"></i>
                    </button>
                    <button onclick="document.getElementById('chatbot-gallery-input').click()" class="chat-tool-btn"
                        title="Upload Photo">
                        <i class="fa-solid fa-image"></i>
                    </button>
                </div>

                <input type="text" id="chatbot-input" placeholder="Ask about bins..."
                    onkeypress="if(event.key === 'Enter') app.sendChatMessage()">
                <button onclick="app.sendChatMessage()" class="chatbot-send-btn"><i
                        class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
        <button id="chatbot-fab" class="chatbot-fab" onclick="app.toggleChat()">
            <i class="fa-solid fa-comment-dots"></i>
        </button>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal: Add Bin -->
    <div id="common-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title">Add New Smart Bin</h3>
                <button onclick="app.closeModal()" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Form injected here -->
            </div>
            <div class="modal-footer">
                <button onclick="app.closeModal()" class="btn secondary-btn">Cancel</button>
                <button onclick="app.submitModal()" class="btn primary-btn">Save Bin</button>
            </div>
        </div>
    </div>

    <!-- Firebase CDN (compat v9) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>

    <!-- App Logic -->
    <script src="js/translations.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/db.js"></script>
    <script src="js/quantum-solver.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
