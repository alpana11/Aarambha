<svg width="100" height="60" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
    <!-- Truck Chassis Shadow -->
    <ellipse cx="50" cy="55" rx="40" ry="5" fill="rgba(0,0,0,0.15)"/>
    
    <!-- Truck Body -->
    <rect x="10" y="15" width="60" height="35" rx="5" fill="#2E7D32" /> <!-- Solid Green -->
    <path d="M70 25 L90 25 L90 50 L70 50 Z" fill="#4CAF50" /> <!-- Cab -->
    <rect x="75" y="30" width="10" height="10" fill="#E3F2FD" opacity="0.8" /> <!-- Window -->
    
    <!-- Eco Leaf Icon -->
    <circle cx="40" cy="32" r="10" fill="white" opacity="0.2"/>
    <path d="M40 25 C45 25 48 30 40 38 C32 30 35 25 40 25" fill="#81C784" />
    <path d="M40 25 L40 38" stroke="white" stroke-width="1" />
    
    <!-- Wheels -->
    <circle cx="25" cy="50" r="6" fill="#333" />
    <circle cx="55" cy="50" r="6" fill="#333" />
    <circle cx="80" cy="50" r="6" fill="#333" />
    
    <!-- Neon Underglow -->
    <rect x="15" y="48" width="70" height="2" fill="#A5D6A7" opacity="0.6" style="filter: blur(2px);"/>
</svg>
